- title: "Fidget Bennett"
  gif: "bennetttoy.gif"  # place the gif in assets/gifs/
  description: |
    My "state-of-the-art" design of the Bennett linkage toy,
    used for public outreach events to demonstrate
    the beauty of spatial mechanisms. Kids do the assembly 
    and can take their own Bennett mechanism home. 
    They seem to like it a lot and many fathers look jealous 😄
  links:
    - label: "STL files"
      text: "find on printables.com"
      url: "https://www.printables.com/model/495258-bennett-mechanism-with-bearings"



- title: "Snapping four-bar"
  gif: "snap.gif"  
  description: |
    A snapping (bi-stable) four-bar has two rigid configurations. 
    The beautiful geometrical construction that relates to the two
    limit poses of Henrici's flexible hyperboloid was done by 
    Hellmuth Stachel, TU Wien, Austria, as part of our joint work.
  links:
    - label: "Video"
      text: "zenodo.org/records/14206067"
      url: "https://zenodo.org/records/14206067"
  citation: "Stachel, H., and Huczala, D. (2025), From Henrici's flexible hyperboloid to snapping spatial four-bars."
  doi: "https://doi.org/10.1016/j.mechmachtheory.2025.106057"



- title: "Flapping wing"
  gif: "flap_wing.gif"
  description: |
    Two Bennett linkages are serially coupled to form 
    a flapping wing mechanism. Only one linkage is actuated,
    the second has an embodied passive folding based on 
    the dynamics of the motion. 
  links:
    - label: "Video"
      text: "zenodo.org/records/18765525"
      url: "https://zenodo.org/records/18765525"
  citation: "Huczala, D., et al. (2026), Bird-Inspired Spatial Flapping Wing Mechanism via Coupled Linkages with Single Actuator."
  doi: "https://doi.org/10.48550/arXiv.2604.07677"



- title: "Motorized six-bar"
  gif: "r6.gif" 
  description: |
    Rational 6R mechanism with 1 DoF, whose coupler motion
    is parameterized by a cubic rational function. 
    Collision-free line model was proposed by Zijia Li from the
    Chinese Academy of Sciences, China. Solid curved-link model 
    was made using Rational Linkages. 
  links:
    - label: "Video"
      text: "https://youtu.be/SC_mPBAiBr0"
      url: "youtu.be/SC_mPBAiBr0"
    - label: "Rational Linkages docs"
      text: "rational-linkages.readthedocs.io"
      url: "https://rational-linkages.readthedocs.io/"
  citation: "Li, Z., Nawratil, G. et al. (2020), Invertible Paradoxic Loop Structures for Transformable Design."
  doi: "https://doi.org/10.1111/cgf.13928"



- title: "Snapping surface"
  gif: "snapping_surface.gif"  
  description: |
    A surface composed of snapping four-bars. 
    The construction is derived from quad nets on Study quadric via Whiteley's de-averaging, 
    and it relates to differential geometry and discrete minimal surfaces. It was a group
    effort at my former Unit at the University of Innsbruck, but I must especially mention 
    Gudrun for her contribution in the construction methodology.
  links:
    - label: "Video"
      text: "zenodo.org/records/19216474"
      url: "https://zenodo.org/records/19216474"
  citation: "Szewieczek, G., Huczala, D., Pfurner, M., and Schröcker, H.-P. (2026), Bistable Quad-Nets Composed of Four-Bar Linkages."
  doi: "https://doi.org/10.48550/arXiv.2604.00527"



- title: "Rational Linkages"
  gif: "rl.gif" 
  description: |
    Although it is a Python library rather than a mechanism, 
    I created this interactive toolbox with much help 
    from my colleagues during my postdoc at the University 
    of Innsbruck, Austria. It is open-source 
    ([code on GitHub](https://github.com/hucik14/rational-linkages))
    package for synthesis and rapid prototyping of rational linkages,
    and you can easily get it via «`pip install rational-linkages`»
    as it is [available on PyPI](https://pypi.org/project/rational-linkages/).
  links:
    - label: "Rational Linkages docs"
      text: "rational-linkages.readthedocs.io"
      url: "https://rational-linkages.readthedocs.io/"
  citation: "Huczala, D. et al. (2023), Rational Linkages: From Poses to 3D-printed Prototypes, <a href='https://arxiv.org/abs/2403.00558' target='_blank'>arXiv:2403.00558</a>."
  doi: "https://doi.org/10.1007/978-3-031-64057-5_27"



- title: "Pick-and-place Bennett demo"
  gif: "tombennett.gif" 
  description: |
    This beautiful manipulation demo using the Bennett mechanism was made 
    by Tomáš Poštulka, VSB - Technical University of Ostrava, Czechia. 
    I helped him only a little with the very first design of the linkage. 
    After Tomáš finished, I had to make and assemble one also for myself asap. 
    Based on experience from public outreach events, some people come repeatedly
    and stare at it in amazement.
  links:
    - label: "Video"
      text: "youtube.com/watch?v=T_7lkPjdcCg"
      url: "https://www.youtube.com/watch?v=T_7lkPjdcCg"



- title: "Bi-Bennett"
  gif: "bibennett.gif"
  description: |
    The two Bennett linkages are coupled with spherical joints
    to form a flexible bi-pyramid with 1 DoF. It is similar 
    to the Bricard's flexible octahedron. 
    The design was proposed by Georg Nawratil from TU Wien, Austria.
  links:
    - label: "Georg's website"
      text: "geometrie.tuwien.ac.at/nawratil"
      url: "https://www.geometrie.tuwien.ac.at/nawratil/"
    - label: "Video"
      text: "zenodo.org/records/18299299"
      url: "https://zenodo.org/records/18299299"
  citation: "Nawratil, G. (2025), Bi-Bennetts - Flexible arrangement of two Bennett tubes."
  doi: "https://doi.org/10.1016/j.cagd.2026.102535"


- title: "Shaky 3-RPR"
  gif: "m3rpr.gif"
  description: |
    The structure should be rigid (imagine pneumatic actuators in the legs 
    that maintain length in this configuration), however it is shaky 
    (infinitesimally moveable) because the direct kinematics solutions coincide.
    It was proposed by Manfred Husty, University of Innsbruck, Austria.
  citation: "Husty, M. (2023), Multiple Solutions of Direct Kinematics of 3-RPR Parallel Manipulators."
  doi: "https://doi.org/10.1007/978-3-031-45705-0_58"



- title: "Even shakier 3-RPR"
  gif: "g3rpr.gif"
  description: |
    The flexibility of this 3-RPR was "enhanced" by replacing rigid bodies 
    (base and coupler triangular platforms) and assembling 
    them using bars in the mechanism's co-linear configuration.
    The moveability is limited by self-collisions, 
    so in reality it would be even higher portion of infinitesimal motion.
    It was proposed by Georg Nawratil from TU Wien, Austria.
  links:
    - label: "Georg's website"
      text: "geometrie.tuwien.ac.at/nawratil"
      url: "https://www.geometrie.tuwien.ac.at/nawratil/"
  citation: "Nawratil, G. (2025), A global approach for the redefinition of higher-order flexibility and rigidity."
  doi: "https://doi.org/10.1016/j.mechmachtheory.2024.105853"



- title: "Multimode 7R with no 7R mode"
  gif: "multimode-xk.gif"
  description: |
    This multimode 7R never reaches its expected motion mode
    with 1 DoF and 7 revolute joints.
    Instead, it switches between multiple 
    different motion modes with various degrees of freedom.
    It was proposed by Xianwen Kong from Heriot-Watt University, UK.
  citation: "Kong, X. (2024), A Variable-DOF Single-Loop 7R Spatial Mechanism That Has No 1-DOF 7R Motion Mode."
  doi: "https://doi.org/10.1007/978-3-031-64057-5_42"



- title: "Multi-Bennett 8R mechanism"
  gif: "r8.gif"
  description: |
    Every second joint of this mechanism is part of a Bennett mechanism.
    It has two degrees of freedom, and when holding one joint still, every second
    one gets blocked. The motion is a rational surface, obtained by factorization
    of bivariate motion polynomials.
  citation: "Frischauf, J., et al. (2023), A multi-Bennett 8R mechanism obtained from factorization of bivariate motion polynomials."
  doi: "https://doi.org/10.1016/j.mechmachtheory.2022.105143"



- title: "Möbius linkage"
  gif: "r9.gif"
  description: |
    This 9R is supposed to have 3 DoFs, but has only 1 as the axes form a discrete Möbius strip.
    It was proposed by Manfred Husty, University of Innsbruck, Austria.
  citation: "Husty, M. (2022), Möbius Linkages."
  doi: "https://doi.org/10.1007/978-3-031-08140-8_1"



- title: "Bricard's orthogonal 6R"
  gif: "bricard-orthogo.gif"
  description: |
    Bricard's orthogonal linkage has consecutive joint axes perpendicular 
    to each other. The perpendicularity is the key for mobility of that
    mechanism.



- title: "Bricard's line-symmetric 6R"
  gif: "bricard-line.gif"
  description: |
    In this Bricard's line-symmetric linkage you can find an axis of symmetry,
    the configuration on one side of the line mirrors the other under a 180° rotation, 
    enabling continuous mobility through this constraint.



- title: "Bricard's plane-symmetric 6R"
  gif: "bricard-plane.gif"
  description: |
    Similarly, this plane-symmetric Bricard's linkage has a symetrical plane
    that joint axes from one side to the other. 



- title: "6-UPU platform"
  gif: "upu6.gif"
  description: |
    There is nothing special about this classic 6-UPU platform, 
    just that the self-made U-joints move very smoothly and are easy 
    to assemble, so it can serve for some inspiration.



- title: "Custom serial 3R"
  gif: "serial3r.gif" 
  description: |
    This demo was created as part of my PhD,
    to show the capabilies of the developed methodology. 
    The topic was focused on synthesis of serial manipulators
    in a collision environment. The presented 3R manipulator 
    can reach 3 prescribed poses while avoiding the obstacles.
  links:
    - label: "Video"
      text: "youtu.be/KPRaVsSBQ40"
      url: "https://youtu.be/KPRaVsSBQ40"
  citation: "Huczala, D. et al. (2022), Multirepresentations and Multiconstraints Approach to the Numerical Synthesis of Serial Kinematic Structures of Manipulators."
  doi: "https://doi.org/10.1109/access.2022.3186098"